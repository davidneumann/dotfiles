---
- name: Check if opencode config exists
  stat:
    path: "{{ home }}/.config/opencode"
  register: opencode_config

- name: Symlink opencode config
  file:
    src: "{{ dotfiles_dir }}/opencode"
    dest: "{{ home }}/.config/opencode"
    state: link
    force: true
  when: not opencode_config.stat.exists or opencode_config.stat.islnk

- name: Check if opencode is already installed
  ansible.builtin.command: which opencode
  register: opencode_check
  failed_when: false
  changed_when: false

- name: Install opencode via install script
  ansible.builtin.shell: curl -fsSL https://opencode.ai/install | bash
  when: opencode_check.rc != 0
