---
- name: Install core utilities (macOS)
  community.general.homebrew:
    name:
      - git
      - tmux
      - neovim
      - fzf
      - ripgrep
      - fd
      - zellij
      - lazygit
      - yazi
    state: present
  when: ansible_facts['system'] == 'Darwin'

- name: Install core utilities (Arch Linux)
  community.general.pacman:
    name:
      - git
      - tmux
      - neovim
      - fzf
      - ripgrep
      - fd
      - lazygit
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Archlinux'

- name: Install core utilities (Ubuntu)
  apt:
    name:
      - git
      - tmux
      - neovim
      - fzf
      - ripgrep
      - fd-find
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install yazi (Arch Linux)
  community.general.pacman:
    name: yazi
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Archlinux'

- name: Check if opencode is already installed
  ansible.builtin.command: which opencode
  register: opencode_check
  failed_when: false
  changed_when: false

- name: Install opencode via install script
  ansible.builtin.shell: curl -fsSL https://opencode.ai/install | bash
  when: opencode_check.rc != 0

- name: Check if rustup is installed
  ansible.builtin.command: which rustup
  register: rustup_check
  failed_when: false
  changed_when: false

- name: Install Rust via rustup
  ansible.builtin.shell: >
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    && RC_FILE="{{ ansible_env.HOME }}/{{ '.zshrc' if 'zsh' in ansible_env.SHELL else '.bashrc' }}"
    && grep -qF 'cargo env' "$RC_FILE" 2>/dev/null
    || echo 'source "$HOME/.cargo/env"' >> "$RC_FILE"
  when: rustup_check.rc != 0

- name: Install cargo packages
  community.general.cargo:
    name:
      - tmux-sessionizer
    state: present
  environment:
    PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"

- name: Install cask applications (macOS)
  community.general.homebrew_cask:
    name:
      - wezterm
      - iterm2
      - font-meslo-lg-nerd-font
      - obsidian
    state: present
  when: ansible_facts['system'] == 'Darwin'
