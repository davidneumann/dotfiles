---
- name: Setup workstation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    home: "{{ ansible_facts['env']['HOME'] }}"
    dotfiles_dir: "{{ home }}/Source/dotfiles"

  roles:
    - role: homebrew
      when: ansible_facts['system'] == 'Darwin'
    - core_utils
    - git
    - zsh
    - oh-my-posh
    - tmux
    - wezterm
    # - zellij
    - nvim
    - dev_tools
    - bin
    - role: macos_defaults
      when: ansible_facts['system'] == 'Darwin'
